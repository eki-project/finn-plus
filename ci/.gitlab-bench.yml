include: ci/.gitlab-setup.yml

stages:
  - build
  - measure
  - collect
  - build_followup
  - measure_followup
  - collect_followup

variables:
  BENCH_CFG:
    description: "Select config, usually provided by parent pipeline"
    value: ""

workflow:
  name: "bench_$BENCH_CFG"

FINN Build:
  id_tokens:
    CI_JOB_JWT:
      aud: https://git.uni-paderborn.de
  stage: build
  needs:
    - job: Build
      pipeline: $PARENT_PIPELINE_ID
  variables:
    SCHEDULER_PARAMETERS: "-A $PROJECT_ACCOUNT -p $SLURM_PARTITION -t $SLURM_TIMEOUT $SLURM_QOS --nodes 1 --ntasks 1 --cpus-per-task $CPU_CORES_BENCH --mem $MEM_BENCH --array 0-$( expr $PARALLEL_JOBS - 1 )"
    NUM_DEFAULT_WORKERS: "$CPU_CORES_BENCH"
  extends: .setup_full_2024_2
  script:
    # Launch additional monitoring
    - $JOB_MONITORING_DIR/monitor.sh $JOB_MONITORING_DIR/$CI_PIPELINE_ID/$HOSTNAME.log &
    # Launch benchmarking script via FINN CLI, includes deps update and environment preparation
    # Also fetch & checkout DVC-managed data, which should already be cached in $CI_DVC_CACHE_DIR
    - |
      source finn-plus-venv/bin/activate
      dvc config cache.dir $CI_DVC_CACHE_DIR
      dvc pull
      finn bench --dependency-path ./deps --build-path $FINN_BUILD_DIR --num-workers $CPU_CORES_BENCH --bench_config $BENCH_CFG
  cache:
    key: $CI_COMMIT_SHA
    policy: pull
    paths:
      - deps
  artifacts:
    name: "build_artifacts"
    when: always
    paths:
      - build_artifacts/

Measurement:
  id_tokens:
    CI_JOB_JWT:
      aud: https://git.uni-paderborn.de
  stage: measure
  tags:
    - board
  rules:
    # Also run on failure of previous tasks to measure partial results
    - when: always
  script:
    # Build power measurement driver (TODO: support other boards)
    - make -C ci/power_measurement/boards/rfsoc2x2 shared
    - make -C ci/power_measurement/boards/rfsoc4x2 shared
    # Install dependencies for FINN driver
    - sudo bash -c "source /etc/profile.d/pynq_venv.sh && chmod +x scripts/driver_install_dependencies.sh && scripts/driver_install_dependencies.sh"
    # Run as root and activate the PYNQ venv manually to use PYNQ outside of the typical Jupyter environment
    - sudo bash -c "source /etc/profile.d/pynq_venv.sh && export XILINX_XRT=/usr && python ci/measure.py"
  artifacts:
    name: "measurement_artifacts"
    when: always
    paths:
      - measurement_artifacts/

Result Collection:
  id_tokens:
    CI_JOB_JWT:
      aud: https://git.uni-paderborn.de
  stage: collect
  tags:
    - image_build
  rules:
    # Also run on failure of previous tasks to collect partial results
    - when: always
  script:
    # pulling models seems to be needed for dvclive to save experiments, even though they are not used or modified
    - dvc pull
    - python3.10 ci/collect.py
    - dvc exp push -f -j 4 -r push git@github.com:eki-project/finn-plus.git
    # Export variable to trigger follow-up stages if config was generated
    - |
      if [ -f followup_bench_config.json ]; then
        echo "HAS_FOLLOWUP=true" >> followup.env
      else
        echo "HAS_FOLLOWUP=false" >> followup.env
      fi
  artifacts:
    name: "collected_artifacts"
    when: always
    paths:
      - build_artifacts/
      - measurement_artifacts/
      - followup_bench_config.json
    reports:
      dotenv: followup.env

# Follow-up stages for live FIFO sizing experiments
# These stages re-run experiments with the FIFO sizes determined during measurement

FINN Build (Follow-up):
  id_tokens:
    CI_JOB_JWT:
      aud: https://git.uni-paderborn.de
  stage: build_followup
  needs:
    - job: Build
      pipeline: $PARENT_PIPELINE_ID
    - job: Result Collection
  rules:
    # Only run if follow-up config was generated (i.e., live_fifo_sizing was enabled)
    - if: $HAS_FOLLOWUP == "true"
  variables:
    SCHEDULER_PARAMETERS: "-A $PROJECT_ACCOUNT -p $SLURM_PARTITION -t $SLURM_TIMEOUT $SLURM_QOS --nodes 1 --ntasks 1 --cpus-per-task $CPU_CORES_BENCH --mem $MEM_BENCH --array 0-$( expr $PARALLEL_JOBS - 1 )"
    NUM_DEFAULT_WORKERS: "$CPU_CORES_BENCH"
  extends: .setup_full_2024_2
  script:
    # Launch additional monitoring
    - $JOB_MONITORING_DIR/monitor.sh $JOB_MONITORING_DIR/$CI_PIPELINE_ID/$HOSTNAME.log &
    # Launch benchmarking script via FINN CLI for follow-up experiments
    # Uses the followup_bench_config.json generated by Result Collection
    - |
      source finn-plus-venv/bin/activate
      dvc config cache.dir $CI_DVC_CACHE_DIR
      dvc pull
      finn bench --dependency-path ./deps --build-path $FINN_BUILD_DIR --num-workers $CPU_CORES_BENCH --bench_config followup
  cache:
    key: $CI_COMMIT_SHA
    policy: pull
    paths:
      - deps
  artifacts:
    name: "build_artifacts_followup"
    when: always
    paths:
      - build_artifacts_followup/

Measurement (Follow-up):
  id_tokens:
    CI_JOB_JWT:
      aud: https://git.uni-paderborn.de
  stage: measure_followup
  needs:
    - job: FINN Build (Follow-up)
  tags:
    - board
  rules:
    # Only run if build_followup stage ran (i.e., if follow-up config exists)
    - if: $HAS_FOLLOWUP == "true"
      when: always
  script:
    # Build power measurement driver (TODO: support other boards)
    - make -C ci/power_measurement/boards/rfsoc2x2 shared
    - make -C ci/power_measurement/boards/rfsoc4x2 shared
    # Install dependencies for FINN driver
    - sudo bash -c "source /etc/profile.d/pynq_venv.sh && chmod +x scripts/driver_install_dependencies.sh && scripts/driver_install_dependencies.sh"
    # Run as root and activate the PYNQ venv manually to use PYNQ outside of the typical Jupyter environment
    - sudo bash -c "source /etc/profile.d/pynq_venv.sh && export XILINX_XRT=/usr && python ci/measure.py --followup"
  artifacts:
    name: "measurement_artifacts_followup"
    when: always
    paths:
      - measurement_artifacts_followup/

Result Collection (Follow-up):
  id_tokens:
    CI_JOB_JWT:
      aud: https://git.uni-paderborn.de
  stage: collect_followup
  needs:
    - job: Result Collection
    - job: FINN Build (Follow-up)
    - job: Measurement (Follow-up)
  tags:
    - image_build
  rules:
    # Only run if measure_followup stage ran
    - if: $HAS_FOLLOWUP == "true"
      when: always
  script:
    # pulling models seems to be needed for dvclive to save experiments, even though they are not used or modified
    - dvc pull
    - python3.10 ci/collect.py --followup
    - dvc exp push -f -j 4 -r push git@github.com:eki-project/finn-plus.git
  artifacts:
    name: "all_artifacts"
    when: always
    paths:
      - build_artifacts/
      - measurement_artifacts/
      - followup_bench_config.json
      - build_artifacts_followup/
      - measurement_artifacts_followup/
